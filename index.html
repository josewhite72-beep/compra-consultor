<script>
// ============================================
// SYSTEM PROMPT — Contexto Legal Precargado
// Basado en Ley 22 de 2006 (Texto Único ordenado por Ley 153 de 2020)
// y Decreto Ejecutivo 439 de 2020
// ============================================
const SYSTEM_PROMPT = `Eres "CompraConsultor", un asistente legal especializado en contrataciones públicas de Panamá. Respondes EXCLUSIVAMENTE con base en la Ley 22 de 2006 (Texto Único ordenado por Ley 153 de 2020), el Decreto Ejecutivo 439 de 2020 (Reglamento) y los dictámenes de la Dirección General de Contrataciones Públicas (DGCP).

CONTEXTO LEGAL CLAVE — CONTRATACIONES MENORES:

📌 DEFINICIÓN (Art. 2 numeral 12, Ley 22):
"Contratación menor: Procedimiento que permitirá, de manera expedita, la adquisición de bienes, servicios u obras que no excedan los cincuenta mil balboas (B/.50,000.00), cumpliéndose con un mínimo de formalidades y con sujeción a los principios de contratación que dispone la presente Ley."

📌 RÉGIMEN LEGAL (Art. 57, Ley 22 / Art. 85 D.E. 439):
- Límite máximo: B/.50,000.00
- No exige fianza de propuesta
- No exige fianza de cumplimiento (salvo que la entidad lo considere necesario)
- El contratista debe garantizar por escrito: condiciones pactadas, defectos de obra (3 años), vicios de bienes (1 año), servicios (1 año)

📌 NIVELES DE COTIZACIONES (Art. 87 D.E. 439/2020):
1. Hasta B/.500.00 → mínimo 1 cotización
2. B/.500.01 a B/.5,000.00 → mínimo 2 cotizaciones
3. B/.5,000.01 a B/.10,000.00 → mínimo 3 cotizaciones
4. B/.10,000.01 a B/.50,000.00 → ACTO PÚBLICO (Art. 94 D.E. 439)

📌 PREFERENCIA MIPYME (Art. 57 Ley 22 / Art. 88 D.E. 439):
Se selecciona la Mipyme si cumple requisitos y su precio NO es mayor al 5% de la propuesta más baja de empresa no Mipyme. Entre Mipymes, gana la de menor precio. Debe estar clasificada en el Registro de Proponentes de PanamaCompra.

📌 PREFERENCIA EMPRESA LOCAL (Art. 12 Ley 22 / Art. 89 D.E. 439):
Empresa domiciliada en el municipio donde se ejecuta el contrato. Gana si cumple requisitos y su precio no supera en 5% la propuesta de empresa no local.

📌 PREVALENCIA (Art. 90 D.E. 439):
Si concurren Mipyme y empresa local, PREFERENCIA a la MIPYME (con el mismo tope del 5%).

📌 REGLAS DE DESEMPATE (Art. 53 D.E. 439) — DISTINTAS de las preferencias de adjudicación:
Solo aplican cuando 2+ propuestas ofertan el MISMO precio y cumplen igual con los requisitos:
1. Si una es Mipyme acreditada ante AMPYME, se le adjudica a ella
2. Si no hay Mipyme o no se resuelve así, se llama a "mejora de precio" en sobre cerrado
3. Si persiste el empate, sorteo público (dados, monedas u otro método transparente) el día hábil siguiente
4. En contrataciones menores el desempate se hace DESPUÉS de recibidas las propuestas

📌 GARANTÍAS EN CONTRATACIÓN MENOR (Art. 86 D.E. 439):
NO se exige fianza de propuesta. El contratista seleccionado debe garantizar por ESCRITO:
- Cumplimiento de condiciones pactadas
- Obras: responder por defectos de construcción hasta 3 años
- Bienes: responder por vicios hasta 1 año (o ciclo de vida si son perecederos)
- Servicios: responder por cumplimiento hasta 1 año

📌 PROCEDIMIENTO PARA CONTRATACIONES MENORES — flujo CL→CM (Art. 87, 91-94 D.E. 439):
1. Solicitud de cotizaciones según el monto (1, 2 o 3 cotizaciones, ver niveles arriba)
2. La Plataforma de Cotizaciones en Línea (CL) abre automáticamente las cotizaciones recibidas y genera cuadro comparativo
3. Si no se recibe ninguna cotización, debe reiniciarse el procedimiento de CL
4. Tras 3 intentos sin lograr el mínimo de cotizaciones, certificado por la plataforma, se puede cotizar por otro medio
5. La entidad selecciona del cuadro comparativo la cotización de MENOR PRECIO que cumpla requisitos
6. Se solicita al proveedor seleccionado los documentos requeridos
7. Si no los presenta, se pasa a la siguiente mejor cotización
8. Se elabora el cuadro de cotizaciones, publicado con el número CL, al cual se asigna un número consecutivo de ACTO PÚBLICO → esto es el número CM
9. Refrendada la orden de compra, se registra y publica en el respectivo acto público

📌 REFRENDO DE CONTRALORÍA (Art. 94 num. 10, Art. 271 D.E. 439):
Es la aprobación de la Contraloría General sobre la orden de compra/contrato. La Contraloría verifica que las certificaciones generadas en cada etapa (incluyendo el Acta/certificación de recibido conforme cuando aplique) estén incorporadas al expediente antes de emitir el refrendo correspondiente.

📌 RECURSO DE IMPUGNACIÓN (Art. 238-246 D.E. 439 / Art. 125, 158 Ley 22):
- Aplica SOLO desde que existe acto de adjudicación, deserción, rechazo de propuestas o cualquier acto que afecte la selección objetiva — es decir, desde la fase CM, NUNCA durante la fase CL (que no es acto público)
- Se presenta ante el Tribunal Administrativo de Contrataciones Públicas, por apoderado legal
- Debe ir acompañado de fianza de recurso de impugnación
- Plazo de admisibilidad: 2 días hábiles tras recepción (si no se resuelve en ese plazo, se entiende admitido)
- Debe contener: órgano ante quien se formula, generales del recurrente, identificación del acto impugnado, hechos, pretensiones, fundamento de derecho, pruebas, fecha y firma
- Si se resuelve a favor del recurrente: devolución inmediata de la fianza
- Si es adverso: la fianza ingresa al Tesoro Nacional (salvo que no haya actuado de forma temeraria)

📌 ACTO DESIERTO (Art. 135 D.E. 439 / Art. 72 Ley 22):
La entidad declara desierto el acto cuando ningún proponente cumple los requisitos del pliego de cargos, o por las demás causales del Art. 72 Ley 22. Ejecutoriada la resolución, la entidad puede convocar nuevamente el mismo acto.

📌 REGISTRO DE PROPONENTES (Art. 272-276 D.E. 439):
Base de datos en PanamaCompra donde se registran personas naturales/jurídicas, consorcios y subcontratistas que aspiren a contratar con el Estado. Las entidades licitantes verifican ahí la condición de Mipyme, empresa local, etc. — NO pueden exigir documentos que ya estén verificables en este registro (Art. 12 D.E. 439).

📌 DOCUMENTOS DEL PROPONENTE (Art. 8 D.E. 439):
- Declaración jurada de no incapacidad legal para contratar (Art. 24 Ley 22)
- No se exigen documentos generales que la entidad pueda validar electrónicamente en PanamaCompra (Art. 12 D.E. 439)
- En contrataciones menores ≤ B/.50,000: no se exige declaración jurada de medidas de retorsión a personas naturales panameñas (Art. 43 Ley 22)

📌 DIVISIÓN DE MATERIA (Art. 36 Ley 22 / Art. 15-17 D.E. 439):
PROHIBIDO dividir contratos para evadir el acto público o los umbrales de aprobación. Se PRESUME división de materia cuando:
- Se suscriben contratos para un mismo bien/servicio/obra en 3 meses con el mismo u otro contratista
- Para bienes perecederos o alimentos para escuelas en áreas de difícil acceso: 1 mes
EXCEPCIONES: órdenes de compra de convenio marco y procedimiento especial de emergencia.

📌 PROCEDIMIENTO EXCEPCIONAL (Art. 79 Ley 22 / Art. 148-153 D.E. 439):
Aplica cuando no hay competencia posible: proveedor único, urgencia evidente, desastres naturales, prórrogas simples >B/.300,000, beneficio social, permuta, artistas/profesionales reconocidos, pobreza multidimensional, seguridad y defensa del Estado, investigación científica (SENACYT).
Documentos mínimos a acompañar la solicitud (Art. 151 D.E. 439): informe técnico fundado, identificación del contratista, propuesta firmada, certificación de partida presupuestaria, aviso de operación, declaración jurada de medidas de retorsión, declaración de no incapacidad legal, certificado de Registro Público, estudio de mercado, al menos 2 propuestas adicionales vía Plataforma de Cotizaciones en Línea, proyecto de contrato o requisición detallada.

📌 PLATAFORMA DE COTIZACIONES EN LÍNEA (Art. 259 D.E. 439):
OBLIGATORIA para contrataciones menores por cotizaciones, procedimiento excepcional y emergencia.

REGLAS DE RESPUESTA:
1. CITA SIEMPRE el artículo específico (ej: "Art. 57 Ley 22" o "Art. 88 D.E. 439")
2. Si la pregunta es sobre un tema NO cubierto por la Ley 22 o D.E. 439, indícalo claramente
3. Sé preciso, conciso y práctico
4. Usa formato con viñetas cuando listes requisitos o pasos
5. Si hay ambigüedad, sugiere consultar el dictamen específico de la DGCP en PanamaCompra
6. Responde SIEMPRE en español
7. NO inventes artículos ni montos. Si no estás seguro, dilo.
8. Para el contexto MEDUCA/FECE (escuelas), aplica las reglas generales pero menciona particularidades como la preferencia para alimentos perecederos (1 mes para evitar presunción de división de materia).`;

// ============================================
// ESTADO
// ============================================
let conversations = JSON.parse(localStorage.getItem('cc_conversations') || '[]');
let currentConvId = null;
let deferredPrompt = null;

// ============================================
// ELEMENTOS DOM
// ============================================
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const historyModal = document.getElementById('history-modal');
const historyList = document.getElementById('history-list');
const installBtn = document.getElementById('install-btn');
const toastEl = document.getElementById('toast');

// ============================================
// UTILIDADES
// ============================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function saveConvos() { localStorage.setItem('cc_conversations', JSON.stringify(conversations)); }
function escapeHtml(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function formatBotResponse(text) {
  let html = escapeHtml(text);
  // Resaltar citas de artículos
  html = html.replace(/(Art\.?\s*\d+[\w\s\.\/\-]*?(?:Ley\s*22|D\.?E\.?\s*439|DGCP))/gi,
    '<span class="cite">📜 $1</span>');
  // Negritas
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Viñetas (ya vienen como • o - en el texto)
  html = html.replace(/^(\s*)[-•]\s+(.+)$/gm, '$1• $2');
  // Saltos de línea
  html = html.replace(/\n/g, '<br>');
  return html;
}

// ============================================
// RENDER CHAT
// ============================================
function renderConversation(conv) {
  chatEl.innerHTML = '';
  if (!conv || !conv.messages.length) {
    addBotMessage('¡Hola! 👋 Soy **CompraConsultor**, tu asistente sobre contrataciones menores en Panamá.\n\nPregúntame sobre:\n• La Ley 22 de 2006\n• El Decreto Ejecutivo 439/2020\n• Cotizaciones, Mipymes, empresas locales\n• Procedimientos excepcionales\n\nPuedes usar los botones de arriba o escribir tu consulta.', false);
    return;
  }
  conv.messages.forEach(m => {
    if (m.role === 'user') addUserMessage(m.content, false);
    else addBotMessage(m.content, false);
  });
}

function addUserMessage(text, save = true) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  chatEl.appendChild(div);
  scrollToBottom();
  if (save) {
    getConv().messages.push({ role: 'user', content: text });
    saveConvos();
  }
}

function addBotMessage(text, save = true) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = formatBotResponse(text);
  chatEl.appendChild(div);
  scrollToBottom();
  if (save) {
    getConv().messages.push({ role: 'assistant', content: text });
    saveConvos();
  }
}

function scrollToBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(div);
  scrollToBottom();
}
function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ============================================
// GESTIÓN DE CONVERSACIONES
// ============================================
function getConv() {
  if (!currentConvId) {
    currentConvId = uid();
    conversations.unshift({
      id: currentConvId,
      title: 'Nueva consulta',
      messages: [],
      createdAt: Date.now()
    });
    saveConvos();
  }
  return conversations.find(c => c.id === currentConvId);
}

function newConversation() {
  currentConvId = null;
  renderConversation(null);
  inputEl.focus();
  showToast('Nueva consulta iniciada');
}

function deleteConversation(id, e) {
  e.stopPropagation();
  if (!confirm('¿Eliminar esta consulta?')) return;
  conversations = conversations.filter(c => c.id !== id);
  saveConvos();
  if (currentConvId === id) newConversation();
  renderHistory();
}

function loadConversation(id) {
  currentConvId = id;
  renderConversation(getConv());
  historyModal.classList.remove('active');
  inputEl.focus();
}

function renderHistory() {
  historyList.innerHTML = '';
  if (!conversations.length) {
    historyList.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">Sin consultas aún</p>';
    return;
  }
  conversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.onclick = () => loadConversation(c.id);
    const firstUserMsg = c.messages.find(m => m.role === 'user');
    const title = firstUserMsg ? firstUserMsg.content.slice(0, 60) : c.title;
    const date = new Date(c.createdAt).toLocaleString('es-PA', { dateStyle: 'short', timeStyle: 'short' });
    div.innerHTML = `
      <button class="delete" onclick="deleteConversation('${c.id}', event)" aria-label="Eliminar">🗑️</button>
      <div class="title">${escapeHtml(title)}${firstUserMsg && firstUserMsg.content.length > 60 ? '...' : ''}</div>
      <div class="meta">${date} · ${c.messages.length} mensajes</div>
    `;
    historyList.appendChild(div);
  });
}

// ============================================
// MANEJO DE SHORTCUTS PWA
// ============================================
function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get('action');
  if (action === 'new') {
    newConversation();
    window.history.replaceState({}, document.title, window.location.pathname);
  } else if (action === 'history') {
    renderHistory();
    historyModal.classList.add('active');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
}

// ============================================
// API CALL — Groq vía proxy Vercel
// ============================================
async function callGroqAPI(messages) {
  const payload = {
    model: 'llama-3.3-70b-versatile',
    messages: [
      { role: 'system', content: SYSTEM_PROMPT },
      ...messages
    ],
    temperature: 0.3,
    max_tokens: 1500
  };

  const endpoints = ['/api/proxy', 'https://api.groq.com/openai/v1/chat/completions'];
  let lastError = null;

  for (const endpoint of endpoints) {
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        lastError = `HTTP ${res.status}`;
        continue;
      }
      const data = await res.json();
      return data.choices[0].message.content;
    } catch (e) {
      lastError = e.message;
    }
  }
  throw new Error('No se pudo conectar con la IA: ' + lastError);
}

// ============================================
// SEND MESSAGE
// ============================================
async function sendMessage(text) {
  if (!text.trim()) return;
  const conv = getConv();
  if (conv.messages.length === 0) {
    conv.title = text.slice(0, 50);
    saveConvos();
  }
  addUserMessage(text);
  sendBtn.disabled = true;
  showTyping();

  try {
    const reply = await callGroqAPI(conv.messages);
    hideTyping();
    addBotMessage(reply);
  } catch (err) {
    hideTyping();
    addBotMessage('⚠️ **Error de conexión**\n\n' + err.message + '\n\nVerifica tu conexión a internet o la configuración del proxy en Vercel.\n\nSi el problema persiste, puedes consultar directamente en [PanamaCompra](https://www.panamacompra.gob.pa).');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ============================================
// EVENT LISTENERS
// ============================================
sendBtn.addEventListener('click', () => {
  sendMessage(inputEl.value);
  inputEl.value = '';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
    inputEl.value = '';
  }
});
document.querySelectorAll('.topic-btn[data-q]').forEach(btn => {
  btn.addEventListener('click', () => {
    sendMessage(btn.dataset.q);
    inputEl.focus();
  });
});
document.getElementById('new-btn').addEventListener('click', newConversation);
document.getElementById('history-btn').addEventListener('click', () => {
  renderHistory();
  historyModal.classList.add('active');
});

// Índice de temas
const topicsModal = document.getElementById('topics-modal');
function openTopicsModal() { topicsModal.classList.add('active'); }
document.getElementById('topics-btn').addEventListener('click', openTopicsModal);
document.getElementById('topics-more-btn').addEventListener('click', openTopicsModal);
document.querySelectorAll('.topic-list-item').forEach(item => {
  item.addEventListener('click', () => {
    sendMessage(item.dataset.q);
    topicsModal.classList.remove('active');
    inputEl.focus();
  });
});
topicsModal.addEventListener('click', e => {
  if (e.target === topicsModal) topicsModal.classList.remove('active');
});

// Cerrar modal al hacer clic fuera
historyModal.addEventListener('click', e => {
  if (e.target === historyModal) historyModal.classList.remove('active');
});

// ============================================
// PWA — Service Worker + Install
// ============================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          if (confirm('Hay una actualización de CompraConsultor. ¿Recargar ahora?')) {
            newWorker.postMessage('SKIP_WAITING');
            window.location.reload();
          }
        }
      });
    });
  }).catch(e => console.warn('SW fail:', e));
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') showToast('¡App instalada!');
  deferredPrompt = null;
  installBtn.style.display = 'none';
});

// ============================================
// INIT
// ============================================
handleUrlParams();
if (conversations.length && !currentConvId) {
  currentConvId = conversations[0].id;
}
renderConversation(getConv());
inputEl.focus();
</script>
</body>
</html>
